<main>
<form action="#" method="post">

    <label for="curso">Curso</label>
    <select id="curso" name="curso" required>
        <option value="">Seleccione una opción</option>
        <option value="pedagogia-cuidado">
            Pedagogía del cuidado y ciudadanía digital
        </option>
        <option value="acoso-escolar">
            Acoso y violencia entre pares
        </option>
    </select>

    <label for="nombre">Apellido y nombre</label>
    <input type="text" id="nombre" name="nombre" required>

    <label for="dni">DNI</label>
    <input type="text" id="dni" name="dni" required>

    <label for="email">Email</label>
    <input type="email" id="email" name="email" required>

    <label for="telefono">Teléfono</label>
    <input type="tel" id="telefono" name="telefono" required>

    <label for="institucion">Institución</label>
    <input type="text" id="institucion" name="institucion">

    <label for="cargo">Cargo o función</label>
    <input type="text" id="cargo" name="cargo">

    <label for="comentarios">Comentarios</label>
    <textarea id="comentarios" name="comentarios" rows="4"></textarea>

    <label>
        <input type="checkbox" name="acepto" required>
        Acepto los términos y condiciones.
    </label>

    <button type="submit">Enviar inscripción</button>

</form>
</main>
